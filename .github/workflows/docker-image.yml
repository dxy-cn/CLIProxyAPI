name: docker-image

on:
  push:
    branches:
      - feature/*
    tags:
      - 'v*-dxy.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "手动指定测试镜像标签"
        required: true

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || github.repository }}

jobs:
  # ============================================
  # 阶段1: 并行构建各平台镜像
  # ============================================
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate DXY release tag
        if: github.ref_type == 'tag'
        run: .github/scripts/validate-release-version.sh "$GITHUB_REF_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}

      - name: Generate build args
        id: buildargs
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$REQUESTED_TAG"
            if [[ ! "$VERSION" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
              echo "invalid OCI tag: $VERSION" >&2
              exit 1
            fi
          else
            VERSION="$(git rev-parse --short HEAD)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=build-${{ env.PLATFORM_PAIR }},mode=max
          build-args: |
            VERSION=${{ steps.buildargs.outputs.VERSION }}
            COMMIT=${{ steps.buildargs.outputs.COMMIT }}
            BUILD_DATE=${{ steps.buildargs.outputs.BUILD_DATE }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================
  # 阶段2: 合并多架构 manifest
  # ============================================
  manifest:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare
        run: |
          echo "IMAGE_NAME_LC=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Validate DXY release tag
        if: github.ref_type == 'tag'
        run: .github/scripts/validate-release-version.sh "$GITHUB_REF_NAME"

      - name: Generate version
        id: version
        env:
          REQUESTED_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="$GITHUB_REF_NAME"
            VERSION="${VERSION#v}"
            PRIMARY_TAG="$VERSION"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$REQUESTED_TAG"
            PRIMARY_TAG="$REQUESTED_TAG"
          else
            VERSION="$(git rev-parse --short HEAD)"
            PRIMARY_TAG="test-$VERSION"
          fi
          if [[ ! "$PRIMARY_TAG" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "invalid OCI tag: $PRIMARY_TAG" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "PRIMARY_TAG=$PRIMARY_TAG" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}
          tags: |
            type=raw,value=${{ steps.version.outputs.PRIMARY_TAG }}
            type=sha,prefix=sha-

      - name: Ensure image tags are unused
        run: |
          while IFS= read -r image_tag; do
            if docker buildx imagetools inspect "$image_tag" >/dev/null 2>&1; then
              echo "refusing to overwrite existing image tag: $image_tag" >&2
              exit 1
            fi
          done < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ steps.version.outputs.PRIMARY_TAG }}
