name: translator-path-guard

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  ensure-no-translator-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect internal/translator changes
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            internal/translator/**
      - name: Fail when restricted paths change
        if: steps.changed-files.outputs.any_changed == 'true' && !contains(github.event.pull_request.labels.*.name, 'allow-translator-changes')
        run: |
          echo "Changes under internal/translator are not allowed in pull requests."
          echo "A repository maintainer must add the allow-translator-changes label for an approved upstream sync."
          exit 1
